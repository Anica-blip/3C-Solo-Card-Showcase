<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>3C Card Showcase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../favicon.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #06040f;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Open Sans', sans-serif;
      overflow: hidden;
    }

    /* ── TV FRAME ── */
    .tv-frame {
      position: relative;
      display: flex; flex-direction: column; align-items: center;
      width: min(720px, 95vw);
    }

    /* ── SILVER BEZEL ── */
    .tv-bezel {
      width: 100%;
      background: linear-gradient(160deg, #22223a 0%, #0d0d1a 60%, #18182c 100%);
      border-radius: 18px 18px 0 0;
      padding: 14px 14px 0;
      border-bottom: none; position: relative;
      box-shadow:
        0 0 0 2px rgba(210,210,230,0.2),
        inset 0 1px 0 rgba(255,255,255,0.10),
        0 -4px 30px rgba(0,0,80,0.3);
    }
    .tv-bezel::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      border-radius: 18px 18px 0 0;
      background: linear-gradient(90deg,
        rgba(120,120,140,0.3) 0%, rgba(220,220,240,0.7) 30%,
        rgba(255,255,255,0.9) 50%, rgba(220,220,240,0.7) 70%,
        rgba(120,120,140,0.3) 100%);
    }

    /* ── TV SCREEN ── */
    .tv-screen {
      width: 100%; aspect-ratio: 16 / 9;
      background: #050510; border-radius: 8px;
      position: relative; overflow: hidden;
      box-shadow:
        inset 0 0 80px rgba(0,0,60,0.6),
        inset 0 0 3px rgba(120,80,255,0.2),
        0 2px 0 rgba(0,0,0,0.8);
    }
    .tv-screen::after {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 3px,
        rgba(0,0,0,0.035) 3px, rgba(0,0,0,0.035) 4px
      );
      pointer-events: none; z-index: 10;
    }
    .screen-glow {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(80,40,160,0.08) 0%, transparent 70%);
      pointer-events: none; z-index: 1;
    }

    /* ── CARD STAGE ── */
    #card-stage {
      position: absolute; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── IMAGE CARD BASE ── */
    .showcase-card {
      position: absolute;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; will-change: transform, opacity;
    }
    .showcase-card img {
      max-width: 100%; max-height: 100%;
      object-fit: contain; display: block;
      box-shadow: 0 10px 50px rgba(0,0,0,0.7);
    }

    /* ── RECTANGLE — full-screen, swipe mode ── */
    .showcase-card.shape-rectangle         { inset: 0; width: 100%; height: 100%; }
    .showcase-card.shape-rectangle img     { width: 100%; height: 100%;
                                             object-fit: contain; border-radius: 0;
                                             box-shadow: none; }

    /* ── SQUARE / CIRCLE — keep float mode ── */
    .showcase-card.shape-square            { width: 60%; height: 85%; }
    .showcase-card.shape-square img        { border-radius: 10px; }
    .showcase-card.shape-circle            { width: 50%; height: 85%; }
    .showcase-card.shape-circle img        { border-radius: 50%; aspect-ratio: 1/1; object-fit: cover; }

    /* ── VIDEO CARD — full-screen ── */
    .showcase-video {
      position: absolute; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      background: #000;
    }
    .showcase-video video {
      width: 100%; height: 100%;
      object-fit: contain;
    }

    /* ── DOWNLOAD BUTTON ── */
    .btn-download {
      position: absolute; bottom: 10px; right: 10px;
      width: 34px; height: 34px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(200,169,110,0.5);
      border-radius: 50%; color: rgba(226,201,138,0.85);
      font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; opacity: 0.6; z-index: 5;
    }
    .btn-download:hover {
      background: rgba(200,169,110,0.25);
      border-color: rgba(226,201,138,0.9);
      opacity: 1; color: #E2C98A;
    }

    /* ── PROGRESS BAR ── */
    #progress-bar-wrap {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px; background: rgba(255,255,255,0.05); z-index: 6;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #a855f7);
      width: 0%; transition: width 0.4s ease;
    }

    /* ── CARD COUNTER ── */
    #card-counter {
      position: absolute; top: 10px; left: 12px;
      font-size: 11px; font-weight: 700;
      color: rgba(196,181,245,0.6); letter-spacing: 0.1em; z-index: 6;
    }

    /* ── FLOAT ANIMATIONS (square / circle) ── */
    @keyframes enterFromLeft {
      0%   { opacity: 0; transform: translateX(-55%) rotate(-8deg); }
      100% { opacity: 1; transform: translateX(0)    rotate(-2deg); }
    }
    @keyframes enterFromRight {
      0%   { opacity: 0; transform: translateX(55%)  rotate(8deg); }
      100% { opacity: 1; transform: translateX(0)    rotate(2deg); }
    }
    @keyframes floatLeft {
      0%,100% { transform: rotate(-2deg) translateY(0px); }
      50%      { transform: rotate(-4deg) translateY(-10px); }
    }
    @keyframes floatRight {
      0%,100% { transform: rotate(2deg) translateY(0px); }
      50%      { transform: rotate(4deg) translateY(-10px); }
    }
    @keyframes exitToRight {
      0%   { opacity: 1; transform: translateX(0)   rotate(-2deg); }
      100% { opacity: 0; transform: translateX(55%) rotate(-8deg); }
    }
    @keyframes exitToLeft {
      0%   { opacity: 1; transform: translateX(0)    rotate(2deg); }
      100% { opacity: 0; transform: translateX(-55%) rotate(8deg); }
    }

    /* ── SWIPE ANIMATIONS (rectangle full-screen) ── */
    @keyframes swipeInFromRight {
      0%   { opacity: 0; transform: translateX(100%); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes swipeOutToLeft {
      0%   { opacity: 1; transform: translateX(0); }
      100% { opacity: 0; transform: translateX(-100%); }
    }

    @keyframes endPulse {
      0%,100% { box-shadow: 0 0 10px rgba(226,201,138,0.4), 0 0 20px rgba(200,169,110,0.2); border-color: rgba(226,201,138,0.5); }
      50%      { box-shadow: 0 0 22px rgba(226,201,138,0.9), 0 0 44px rgba(200,169,110,0.6); border-color: rgba(226,201,138,0.9); }
    }

    /* ── SILVER CONTROLS BEZEL ── */
    .tv-controls {
      width: 100%;
      background: linear-gradient(160deg, #18182c 0%, #0a0a14 100%);
      border-radius: 0 0 18px 18px; border-top: none;
      padding: 10px 18px 12px;
      display: flex; align-items: center; justify-content: space-between;
      position: relative;
      box-shadow:
        0 0 0 2px rgba(210,210,230,0.17),
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 4px 20px rgba(0,0,0,0.5);
    }
    .tv-controls::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      border-radius: 0 0 18px 18px;
      background: linear-gradient(90deg,
        rgba(120,120,140,0.3) 0%, rgba(200,200,220,0.6) 30%,
        rgba(240,240,255,0.85) 50%, rgba(200,200,220,0.6) 70%,
        rgba(120,120,140,0.3) 100%);
    }
    .bezel-dots { display: flex; gap: 5px; align-items: center; }
    .bezel-dot { width: 6px; height: 6px; border-radius: 50%; }
    .bezel-dot.silver { background: rgba(200,200,220,0.4); }
    .bezel-dot.dim    { background: rgba(80,80,100,0.3); }
    .bezel-title {
      font-size: 11px; font-weight: 700;
      color: rgba(196,181,245,0.45); letter-spacing: 0.18em;
      text-transform: uppercase; flex: 1; text-align: center;
    }
    .bezel-btns { display: flex; gap: 8px; align-items: center; }

    /* ── BEZEL BUTTONS ── */
    .bezel-btn {
      width: 32px; height: 32px;
      background: linear-gradient(145deg, rgba(40,40,60,0.8), rgba(20,20,35,0.9));
      border: 1px solid rgba(180,180,210,0.25);
      border-radius: 50%; color: rgba(200,200,220,0.7);
      font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 1px 3px rgba(0,0,0,0.4);
    }
    .bezel-btn:hover {
      background: rgba(124,58,237,0.2);
      border-color: rgba(168,85,247,0.5); color: #c4b5f5;
      box-shadow: 0 0 10px rgba(124,58,237,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    /* Music PLAYING — gold glow */
    .bezel-btn.music-playing {
      background: linear-gradient(135deg, rgba(200,169,110,0.25), rgba(226,201,138,0.15));
      border-color: rgba(226,201,138,0.7);
      color: #E2C98A;
      box-shadow:
        0 0 12px rgba(226,201,138,0.5),
        0 0 24px rgba(200,169,110,0.25),
        inset 0 1px 0 rgba(255,255,255,0.1);
      animation: musicPulse 2.4s ease-in-out infinite;
    }

    /* Music MUTED — dim */
    .bezel-btn.music-muted {
      background: rgba(20,20,35,0.6);
      border-color: rgba(100,100,130,0.2);
      color: rgba(140,140,170,0.35);
      box-shadow: none;
    }

    /* Exit highlight at end */
    .bezel-btn.exit-highlight {
      animation: endPulse 1.2s ease-in-out infinite;
      color: #E2C98A;
    }

    @keyframes musicPulse {
      0%,100% { box-shadow: 0 0 10px rgba(226,201,138,0.4), 0 0 20px rgba(200,169,110,0.2); }
      50%      { box-shadow: 0 0 18px rgba(226,201,138,0.7), 0 0 36px rgba(200,169,110,0.4); }
    }

    /* ── LOADING / ERROR / END STATES ── */
    #loadingState, #errorState, #endState {
      position: absolute; inset: 0; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; padding: 24px; text-align: center;
    }
    #loadingState {
      background: #050510; color: #a855f7;
      font-size: 0.82rem; letter-spacing: 0.14em;
      animation: pulse 1.8s ease-in-out infinite;
    }
    #errorState  { background: #050510; display: none; color: rgba(196,181,245,0.6); font-size: 0.8rem; }
    #errorState strong { color: #a855f7; font-size: 0.9rem; display: block; }
    #endState {
      background: rgba(5,5,16,0.92); display: none;
      color: rgba(196,181,245,0.7); font-size: 0.78rem; letter-spacing: 0.1em;
    }
    #endState span { color: rgba(196,181,245,0.5); font-size: 0.7rem; }

    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

    /* ── TV STAND ── */
    .tv-stand { width: 30%; display: flex; flex-direction: column; align-items: center; }
    .stand-neck {
      width: 18px; height: 22px;
      background: linear-gradient(180deg, #2a2a40, #0d0d1a);
      border-left: 1.5px solid rgba(200,200,220,0.18);
      border-right: 1.5px solid rgba(200,200,220,0.18);
    }
    .stand-base {
      width: 100%; height: 8px;
      background: linear-gradient(180deg, #2a2a40, #0d0d1a);
      border-radius: 0 0 6px 6px;
      border: 1.5px solid rgba(200,200,220,0.14); border-top: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    @media (max-width: 600px) {
      .tv-frame { width: 100vw; }
      .tv-bezel { border-radius: 0; padding: 8px 8px 0; }
      .tv-controls { border-radius: 0; }
      .tv-stand { display: none; }
    }

    /* ── CONSENT OVERLAY — lives inside the TV screen ── */
    #consent-overlay {
      position: absolute; inset: 0; z-index: 30;
      background: #050510;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: clamp(14px, 3vw, 26px);
      padding: clamp(20px, 5vw, 48px);
      text-align: center;
      transition: opacity 0.5s ease;
    }
    #consent-overlay.hidden {
      opacity: 0; pointer-events: none;
    }
    .co-glow {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%, rgba(80,40,160,0.10) 0%, transparent 70%);
    }
    .co-sub {
      position: relative; z-index: 1;
      font-size: clamp(0.82rem, 1.8vw, 1.05rem);
      font-weight: 600; color: #fff; line-height: 1.85;
      text-shadow:
        0 0 12px rgba(196,181,245,0.9),
        0 0 30px rgba(168,85,247,0.5);
      letter-spacing: 0.02em;
    }
    .co-meta {
      position: relative; z-index: 1;
      font-size: clamp(0.65rem, 1.2vw, 0.78rem);
      font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(168,85,247,0.75);
      text-shadow: 0 0 10px rgba(168,85,247,0.5);
    }
    .co-begin {
      position: relative; z-index: 1;
      font-family: 'Open Sans', sans-serif;
      font-size: clamp(0.75rem, 1.6vw, 0.92rem);
      font-weight: 800; letter-spacing: 0.22em; text-transform: uppercase;
      color: #3B1265;
      background: linear-gradient(135deg, #E2C98A, #C8A96E);
      border: none; border-radius: 50px;
      padding: clamp(10px, 2vw, 15px) clamp(32px, 6vw, 56px);
      cursor: pointer;
      box-shadow:
        0 0 20px rgba(226,201,138,0.6),
        0 0 40px rgba(200,169,110,0.35),
        0 4px 22px rgba(200,169,110,0.45);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .co-begin:hover {
      transform: translateY(-2px);
      box-shadow:
        0 0 30px rgba(226,201,138,0.9),
        0 0 60px rgba(200,169,110,0.6),
        0 8px 30px rgba(200,169,110,0.65);
    }
    .co-begin:active { transform: scale(0.96); }
  </style>
</head>
<body>

<div class="tv-frame">
  <div class="tv-bezel">
    <div class="tv-screen" id="tv-screen">
      <div class="screen-glow"></div>
      <div id="loadingState">Loading showcase…</div>
      <div id="errorState"><strong>Showcase not found</strong><p>This link may be invalid.</p></div>
      <div id="endState">
        <span>&#x25A0; &#x25A0; &#x25A0;</span>
        Showcase complete
        <span>Use the exit button below to close</span>
      </div>

      <!-- ── CONSENT SCREEN — shown first, dismissed by Begin click ── -->
      <!-- User gesture happens HERE on the same page so ambient + video fire immediately -->
      <div id="consent-overlay">
        <div class="co-glow"></div>
        <div class="co-sub">
          Cards float one by one across your screen.<br/>
          Download any card you love — exit anytime.
        </div>
        <div class="co-meta" id="co-meta"></div>
        <button class="co-begin" id="co-begin-btn" onclick="beginFromConsent()">Begin</button>
      </div>

      <div id="card-stage"></div>
      <div id="card-counter"></div>
      <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    </div>
  </div>

  <div class="tv-controls">
    <div class="bezel-dots">
      <div class="bezel-dot silver"></div>
      <div class="bezel-dot dim"></div>
      <div class="bezel-dot dim"></div>
    </div>
    <div class="bezel-title" id="bezel-title">3C Card Showcase</div>
    <div class="bezel-btns">
      <!-- Music: gold glow = playing, dim = muted. Click to toggle. -->
      <button class="bezel-btn" id="btn-music" title="Mute / unmute music"
        onclick="toggleMusic()" style="display:none;">&#9836;</button>
      <button class="bezel-btn" id="btn-exit" title="Exit showcase"
        onclick="exitShowcase()">&#10005;</button>
    </div>
  </div>

  <div class="tv-stand">
    <div class="stand-neck"></div>
    <div class="stand-base"></div>
  </div>
</div>

<!-- Ambient audio track -->
<audio id="ambient-audio" loop preload="auto"></audio>

<script>
/* ═══════════════════════════════════════════════════
   public/index.html — 3C Card Showcase TV Viewer
   ────────────────────────────────────────────────────
   Rectangle cards : full-screen swipe (swipeInFromRight / swipeOutToLeft)
   Square / Circle : original tilt + float animation
   Video cards     : full-screen, ambient music plays alongside
   Ambient music   : immediate play attempt → 1s retry (desktop) → click fallback
   Built with ❤️ by Claude (Anthropic) × Chef Anica · 3C Thread To Success Cooking Lab 🧪👨‍🍳
═══════════════════════════════════════════════════ */

  const WORKER_URL      = 'https://3c-card-showcase.3c-innertherapy.workers.dev';
  const DEFAULT_CARD_MS = 9000;
  const ENTER_MS        = 800;
  const EXIT_MS         = 800;

  let cards             = [];
  let currentIdx        = 0;
  let isRunning         = false;
  let ambientPlaying    = false;   // true = music is currently audible
  let hasAmbient        = false;
  let exitTarget        = '../index.html';
  let cardTimer         = null;
  let videoPreloadCache = {};      // idx → HTMLVideoElement, pre-buffered off-stage

  const ambientAudio = document.getElementById('ambient-audio');
  const musicBtn     = document.getElementById('btn-music');

  function getSlug() {
    return new URLSearchParams(location.search).get('showcase');
  }

  /* ══════════════════════════════════════════════════
     INIT — loads data, shows consent overlay.
     Showcase does NOT start until beginFromConsent().
     Mirrors the Word Search pattern exactly: consent
     button lives on THIS page so the user gesture is
     never lost across a page navigation.
  ══════════════════════════════════════════════════ */
  async function init() {
    const slug = getSlug();
    if (!slug) { showError(); return; }

    let data = null;
    try {
      const cached = sessionStorage.getItem('showcaseData');
      if (cached) { data = JSON.parse(cached); sessionStorage.removeItem('showcaseData'); }
    } catch(_) {}

    if (!data || !data.cards || data.cards.length === 0) {
      try {
        const res = await fetch(`${WORKER_URL}/showcase/${slug}`);
        if (!res.ok) throw new Error();
        data = await res.json();
      } catch(_) { showError(); return; }
    }

    if (!data || !data.cards || data.cards.length === 0) { showError(); return; }

    cards = data.cards;
    document.getElementById('bezel-title').textContent = data.title || '3C Card Showcase';
    exitTarget = `../landing.html?showcase=${encodeURIComponent(slug)}`;

    // Populate consent card count
    const metaEl = document.getElementById('co-meta');
    if (metaEl && cards.length > 0) {
      metaEl.textContent = `${cards.length} card${cards.length !== 1 ? 's' : ''} in this showcase`;
    }

    // Pre-load ambient src so it's ready the instant Begin is clicked
    if (data.ambient_music_url) {
      hasAmbient       = true;
      ambientAudio.src = data.ambient_music_url;
      ambientAudio.load();
      musicBtn.style.display = 'flex';
    }

    // Hide loading spinner — consent overlay is now visible
    hideLoading();
    // ↑ Showcase runs only after Begin is clicked (beginFromConsent below)
  }

  /* ══════════════════════════════════════════════════
     BEGIN FROM CONSENT
     The Begin button click IS the user gesture.
     Everything starts here on the same page —
     ambient plays instantly, video unmutes on play().
     No sessionStorage flags, no retries, no fallbacks.
  ══════════════════════════════════════════════════ */
  function beginFromConsent() {
    // Fade out and remove consent overlay
    const overlay = document.getElementById('consent-overlay');
    overlay.classList.add('hidden');
    setTimeout(() => { overlay.style.display = 'none'; }, 500);

    // Start ambient — this IS the user gesture, plays immediately on all platforms
    if (hasAmbient) {
      ambientAudio.play().then(() => {
        ambientPlaying = true;
        setMusicBtnState('playing');
      }).catch(() => {
        ambientPlaying = false;
        setMusicBtnState('muted');
      });
    }

    // Run the showcase
    runShowcase();
  }
  window.beginFromConsent = beginFromConsent;



  /* ══════════════════════════════════════════════════
     MUSIC CONTROLS
  ══════════════════════════════════════════════════ */
  function setMusicBtnState(state) {
    musicBtn.classList.remove('music-playing', 'music-muted');
    if (state === 'playing') musicBtn.classList.add('music-playing');
    if (state === 'muted')   musicBtn.classList.add('music-muted');
  }

  function toggleMusic() {
    if (!hasAmbient) return;
    if (ambientPlaying) {
      ambientAudio.pause();
      ambientPlaying = false;
      setMusicBtnState('muted');
    } else {
      ambientAudio.play().catch(() => {});
      ambientPlaying = true;
      setMusicBtnState('playing');
    }
  }
  window.toggleMusic = toggleMusic;

  /* ══════════════════════════════════════════════════
     SHOWCASE RUNNER
  ══════════════════════════════════════════════════ */
  function runShowcase() {
    isRunning = true;
    showCard(0);
  }

  function showCard(idx) {
    if (idx >= cards.length) { endShowcase(); return; }
    currentIdx = idx;

    // Always clear any lingering timer from the previous card
    if (cardTimer) { clearTimeout(cardTimer); cardTimer = null; }

    const card      = cards[idx];
    const mediaType = card.media_type || 'image';

    document.getElementById('card-counter').textContent = `${idx + 1} \u2022 ${cards.length}`;
    document.getElementById('progress-bar').style.width = `${((idx + 1) / cards.length) * 100}%`;

    const stage = document.getElementById('card-stage');
    stage.innerHTML = '';

    if (mediaType === 'video') {
      showVideoCard(idx, card, stage);
    } else {
      showImageCard(idx, card, stage);
    }

    // ── LOOK-AHEAD PRELOAD ──
    // While the current card is on screen, silently buffer the next video
    // so it is ready to play the instant it's needed — no buffering stall.
    preloadNextVideo(idx + 1);
  }

  /* ══════════════════════════════════════════════════
     IMAGE CARD
     - shape-rectangle : full-screen swipe left/right
     - shape-square    : tilt + float (original)
     - shape-circle    : tilt + float (original)
  ══════════════════════════════════════════════════ */
  function showImageCard(idx, card, stage) {
    const shape  = card.shape || 'rectangle';
    const cardMs = (card.duration_ms && card.duration_ms > 0) ? card.duration_ms : DEFAULT_CARD_MS;

    const el = document.createElement('div');
    el.className = `showcase-card shape-${shape}`;

    const img     = document.createElement('img');
    img.src       = card.image_url || card.media_url || '';
    img.alt       = `Card ${idx + 1}`;
    img.draggable = false;
    el.appendChild(img);

    // Download button
    const dlBtn = document.createElement('button');
    dlBtn.className = 'btn-download';
    dlBtn.title     = 'Download this card';
    dlBtn.innerHTML = '&#8595;';
    dlBtn.addEventListener('click', e => { e.stopPropagation(); downloadCard(img.src, idx + 1); });
    el.appendChild(dlBtn);

    stage.appendChild(el);

    if (shape === 'rectangle') {
      /* ── SWIPE MODE ─────────────────────────────────
         Slide in from right, hold for cardMs, slide out to left.
         Both timers stored in cardTimer so either can be
         cancelled cleanly — prevents card skip / double-show.
      ─────────────────────────────────────────────── */
      el.style.animation = `swipeInFromRight ${ENTER_MS}ms ease forwards`;

      cardTimer = setTimeout(() => {
        el.style.animation = `swipeOutToLeft ${EXIT_MS}ms ease forwards`;
        // Overwrite cardTimer with the exit animation timer —
        // now showCard()'s clearTimeout at the top catches it too
        cardTimer = setTimeout(() => showCard(idx + 1), EXIT_MS);
      }, cardMs);

    } else {
      /* ── FLOAT MODE ─────────────────────────────────
         Original tilt + float for square / circle cards.
         Same fix applied — inner timer overwrites cardTimer.
      ─────────────────────────────────────────────── */
      const fromLeft = idx % 2 === 0;
      const floatMs  = Math.max(500, cardMs - ENTER_MS - EXIT_MS);

      el.style.animation = `${fromLeft ? 'enterFromLeft' : 'enterFromRight'} ${ENTER_MS}ms ease forwards`;

      setTimeout(() => {
        el.style.animation = `${fromLeft ? 'floatLeft' : 'floatRight'} ${floatMs}ms ease-in-out infinite`;
        el.style.opacity   = '1';
        el.style.transform = `rotate(${fromLeft ? '-2deg' : '2deg'})`;
      }, ENTER_MS);

      cardTimer = setTimeout(() => {
        el.style.animation = `${fromLeft ? 'exitToRight' : 'exitToLeft'} ${EXIT_MS}ms ease forwards`;
        cardTimer = setTimeout(() => showCard(idx + 1), EXIT_MS);
      }, ENTER_MS + floatMs);
    }
  }

  /* ══════════════════════════════════════════════════
     LOOK-AHEAD VIDEO PRELOADER
     Called every time a card is shown. If the NEXT card
     is a video and not already cached, creates a hidden
     <video> element and begins buffering it immediately
     while the current card is still on screen.
     showVideoCard() reuses this element so playback
     starts instantly with no buffering delay.
  ══════════════════════════════════════════════════ */
  function preloadNextVideo(nextIdx) {
    if (nextIdx >= cards.length) return;
    const next = cards[nextIdx];
    if (!next || (next.media_type || 'image') !== 'video') return;
    if (videoPreloadCache[nextIdx]) return; // already cached

    const src = next.media_url || next.video_url || '';
    if (!src) return;

    const v       = document.createElement('video');
    v.src         = src;
    v.preload     = 'auto';
    v.muted       = true;
    v.playsInline = true;
    // Position off-screen — not visible, just buffering
    v.style.cssText = 'position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;left:-9999px;';
    document.body.appendChild(v);
    v.load();

    videoPreloadCache[nextIdx] = v;
  }

  /* ══════════════════════════════════════════════════
     VIDEO CARD
     - Checks preload cache first — reuses buffered element
       so video fires instantly with no loading stall
     - Ambient music continues playing (not paused)
     - Safety timer starts ONLY from 'playing' event
       so any remaining buffering never eats display time
     - 5-second buffer on fallback timeout
     - 'ended' clears fallback timer to prevent replay
  ══════════════════════════════════════════════════ */
  function showVideoCard(idx, card, stage) {
    const wrap = document.createElement('div');
    wrap.className = 'showcase-video';

    // Reuse preloaded element if available — already buffered, fires instantly
    // Otherwise create fresh (e.g. first card in sequence is a video)
    let video = videoPreloadCache[idx] || null;

    if (video) {
      // Detach from off-screen holding position, reset styles for full display
      if (video.parentNode) video.parentNode.removeChild(video);
      video.style.cssText = 'width:100%;height:100%;object-fit:contain;';
      delete videoPreloadCache[idx];
    } else {
      video             = document.createElement('video');
      video.src         = card.media_url || card.video_url || '';
      video.preload     = 'auto';
      video.playsInline = true;
      video.controls    = false;
      video.style.cssText = 'width:100%;height:100%;object-fit:contain;';
    }

    // Always ensure these are set correctly before play
    video.autoplay = true;
    video.muted    = true;   // start muted — passes all browser autoplay policies
    video.controls = false;

    wrap.appendChild(video);
    stage.appendChild(wrap);

    // ── SAFETY-NET TIMER ──
    // Starts only after video is actually rendering frames ('playing' event).
    // Buffering time does NOT count against the video's runtime.
    // 5-second buffer beyond detected length so no video gets cut short.
    video.addEventListener('playing', () => {
      if (card.duration_ms && card.duration_ms > 0) {
        cardTimer = setTimeout(() => {
          video.pause();
          showCard(idx + 1);
        }, card.duration_ms + 5000);
      }
    }, { once: true });

    // ── NATURAL END ──
    // Clear fallback timer first — prevents double-advance (replay bug).
    video.addEventListener('ended', () => {
      if (cardTimer) { clearTimeout(cardTimer); cardTimer = null; }
      showCard(idx + 1);
    }, { once: true });

    // ── LOAD / DECODE ERROR ──
    video.addEventListener('error', () => {
      if (cardTimer) { clearTimeout(cardTimer); cardTimer = null; }
      showCard(idx + 1);
    }, { once: true });

    // ── PLAY — start muted, unmute immediately after playback begins ──
    // Muted autoplay is universally allowed. Unmuting right after play()
    // resolves is permitted — user already consented on the consent page.
    video.play().then(() => {
      video.muted = false;
    }).catch(() => {
      if (cardTimer) { clearTimeout(cardTimer); cardTimer = null; }
      setTimeout(() => showCard(idx + 1), 500);
    });
  }

  /* ══════════════════════════════════════════════════
     END / EXIT
  ══════════════════════════════════════════════════ */
  function endShowcase() {
    isRunning = false;
    document.getElementById('card-stage').innerHTML   = '';
    document.getElementById('endState').style.display = 'flex';
    document.getElementById('progress-bar').style.width = '100%';
    document.getElementById('card-counter').textContent = '';
    document.getElementById('btn-exit').classList.add('exit-highlight');
  }

  function exitShowcase() {
    if (cardTimer) clearTimeout(cardTimer);
    ambientAudio.pause();
    // Running inside the Vault's iframe modal — ask the parent page
    // to close the modal instead of navigating this little window
    // to a local page (which just swaps what's shown inside it).
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'vault-close-modal' }, '*');
      return;
    }
    // Standalone / not inside the Vault — original behaviour unchanged
    location.href = exitTarget;
  }
  window.exitShowcase = exitShowcase;

  /* ══════════════════════════════════════════════════
     DOWNLOAD IMAGE
  ══════════════════════════════════════════════════ */
  async function downloadCard(url, idx) {
    try {
      const res  = await fetch(url);
      const blob = await res.blob();
      const link = document.createElement('a');
      link.href     = URL.createObjectURL(blob);
      link.download = `3c-card-${String(idx).padStart(3, '0')}.png`;
      link.click();
      URL.revokeObjectURL(link.href);
    } catch(e) { console.warn('Download failed:', e); }
  }

  function hideLoading() { document.getElementById('loadingState').style.display = 'none'; }
  function showError() {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display   = 'flex';
  }

  init();
</script>
</body>
</html>
