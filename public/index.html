<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>3C Card Showcase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../favicon.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #06040f;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Open Sans', sans-serif;
      overflow: hidden;
    }

    /* ── TV OUTER FRAME ── */
    .tv-frame {
      position: relative;
      display: flex; flex-direction: column; align-items: center;
      width: min(720px, 95vw);
    }

    /* ── SILVER BEZEL ── */
    .tv-bezel {
      width: 100%;
      background: linear-gradient(160deg, #22223a 0%, #0d0d1a 60%, #18182c 100%);
      border-radius: 18px 18px 0 0;
      padding: 14px 14px 0;
      border-bottom: none;
      position: relative;
      box-shadow:
        0 0 0 2px rgba(210,210,230,0.2),
        inset 0 1px 0 rgba(255,255,255,0.10),
        0 -4px 30px rgba(0,0,80,0.3);
    }
    /* Silver top edge highlight */
    .tv-bezel::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      border-radius: 18px 18px 0 0;
      background: linear-gradient(90deg,
        rgba(120,120,140,0.3) 0%,
        rgba(220,220,240,0.7) 30%,
        rgba(255,255,255,0.9) 50%,
        rgba(220,220,240,0.7) 70%,
        rgba(120,120,140,0.3) 100%);
    }

    /* ── TV SCREEN ── */
    .tv-screen {
      width: 100%; aspect-ratio: 16 / 9;
      background: #050510; border-radius: 8px;
      position: relative; overflow: hidden;
      box-shadow:
        inset 0 0 80px rgba(0,0,60,0.6),
        inset 0 0 3px rgba(120,80,255,0.2),
        0 2px 0 rgba(0,0,0,0.8);
    }
    .tv-screen::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0) 0px, rgba(0,0,0,0) 3px,
        rgba(0,0,0,0.035) 3px, rgba(0,0,0,0.035) 4px
      );
      pointer-events: none; z-index: 10;
    }
    .screen-glow {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(80,40,160,0.08) 0%, transparent 70%);
      pointer-events: none; z-index: 1;
    }

    /* ── CARD STAGE ── */
    #card-stage {
      position: absolute; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── CARD ── */
    .showcase-card {
      position: absolute;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; will-change: transform, opacity;
    }
    .showcase-card img {
      max-width: 100%; max-height: 100%;
      object-fit: contain; display: block;
      box-shadow: 0 10px 50px rgba(0,0,0,0.7);
    }
    .showcase-card.shape-rectangle { width: 42%; height: 85%; }
    .showcase-card.shape-rectangle img { border-radius: 10px; }
    .showcase-card.shape-square    { width: 60%; height: 85%; }
    .showcase-card.shape-square img { border-radius: 10px; }
    .showcase-card.shape-circle    { width: 50%; height: 85%; }
    .showcase-card.shape-circle img { border-radius: 50%; aspect-ratio: 1/1; object-fit: cover; }

    /* ── DOWNLOAD BUTTON ── */
    .btn-download {
      position: absolute; bottom: 10px; right: 10px;
      width: 34px; height: 34px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(200,169,110,0.5);
      border-radius: 50%; color: rgba(226,201,138,0.85);
      font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; opacity: 0.6; z-index: 5;
    }
    .btn-download:hover {
      background: rgba(200,169,110,0.25);
      border-color: rgba(226,201,138,0.9);
      opacity: 1; color: #E2C98A;
    }

    /* ── PROGRESS BAR ── */
    #progress-bar-wrap {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px; background: rgba(255,255,255,0.05); z-index: 6;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #a855f7);
      width: 0%; transition: width 0.3s ease;
    }

    /* ── CARD COUNTER ── */
    #card-counter {
      position: absolute; top: 10px; left: 12px;
      font-size: 11px; font-weight: 700;
      color: rgba(196,181,245,0.6); letter-spacing: 0.1em; z-index: 6;
    }

    /* ── ANIMATIONS ── */
    @keyframes enterFromLeft {
      0%   { opacity: 0; transform: translateX(-55%) rotate(-8deg); }
      100% { opacity: 1; transform: translateX(0)    rotate(-2deg); }
    }
    @keyframes enterFromRight {
      0%   { opacity: 0; transform: translateX(55%)  rotate(8deg); }
      100% { opacity: 1; transform: translateX(0)    rotate(2deg); }
    }
    @keyframes floatLeft {
      0%,100% { transform: rotate(-2deg) translateY(0px); }
      50%      { transform: rotate(-4deg) translateY(-10px); }
    }
    @keyframes floatRight {
      0%,100% { transform: rotate(2deg) translateY(0px); }
      50%      { transform: rotate(4deg) translateY(-10px); }
    }
    @keyframes exitToRight {
      0%   { opacity: 1; transform: translateX(0)   rotate(-2deg); }
      100% { opacity: 0; transform: translateX(55%) rotate(-8deg); }
    }
    @keyframes exitToLeft {
      0%   { opacity: 1; transform: translateX(0)    rotate(2deg); }
      100% { opacity: 0; transform: translateX(-55%) rotate(8deg); }
    }
    @keyframes endPulse {
      0%,100% { box-shadow: 0 0 10px rgba(226,201,138,0.4), 0 0 20px rgba(200,169,110,0.2); }
      50%      { box-shadow: 0 0 20px rgba(226,201,138,0.9), 0 0 40px rgba(200,169,110,0.6); }
    }

    /* ── SILVER CONTROLS BEZEL ── */
    .tv-controls {
      width: 100%;
      background: linear-gradient(160deg, #18182c 0%, #0a0a14 100%);
      border-radius: 0 0 18px 18px;
      border-top: none;
      padding: 10px 18px 12px;
      display: flex; align-items: center; justify-content: space-between;
      position: relative;
      box-shadow:
        0 0 0 2px rgba(210,210,230,0.17),
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 4px 20px rgba(0,0,0,0.5);
    }
    /* Silver bottom edge */
    .tv-controls::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      border-radius: 0 0 18px 18px;
      background: linear-gradient(90deg,
        rgba(120,120,140,0.3) 0%,
        rgba(200,200,220,0.6) 30%,
        rgba(240,240,255,0.85) 50%,
        rgba(200,200,220,0.6) 70%,
        rgba(120,120,140,0.3) 100%);
    }

    /* Decorative dots */
    .bezel-dots { display: flex; gap: 5px; align-items: center; }
    .bezel-dot { width: 6px; height: 6px; border-radius: 50%; }
    .bezel-dot.silver { background: rgba(200,200,220,0.4); }
    .bezel-dot.dim    { background: rgba(80,80,100,0.3); }

    .bezel-title {
      font-size: 11px; font-weight: 700;
      color: rgba(196,181,245,0.45);
      letter-spacing: 0.18em; text-transform: uppercase;
      flex: 1; text-align: center;
    }

    .bezel-btns { display: flex; gap: 8px; align-items: center; }

    /* Silver bezel buttons */
    .bezel-btn {
      width: 32px; height: 32px;
      background: linear-gradient(145deg, rgba(40,40,60,0.8), rgba(20,20,35,0.9));
      border: 1px solid rgba(180,180,210,0.25);
      border-radius: 50%;
      color: rgba(200,200,220,0.7);
      font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 1px 3px rgba(0,0,0,0.4);
    }
    .bezel-btn:hover {
      background: rgba(124,58,237,0.2);
      border-color: rgba(168,85,247,0.5);
      color: #c4b5f5;
      box-shadow: 0 0 10px rgba(124,58,237,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    /* Music playing = active (lit up) */
    .bezel-btn.active {
      background: rgba(124,58,237,0.3);
      border-color: rgba(168,85,247,0.7);
      color: #e2d9f3;
      box-shadow: 0 0 12px rgba(168,85,247,0.4), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    /* Music muted = muted state (dimmed) */
    .bezel-btn.muted {
      background: rgba(30,30,50,0.6);
      border-color: rgba(100,100,130,0.2);
      color: rgba(150,150,180,0.35);
    }
    .bezel-btn.exit-highlight {
      animation: endPulse 1.2s ease-in-out infinite;
      border-color: rgba(226,201,138,0.7);
      color: #E2C98A;
    }

    /* ── LOADING / ERROR / END ── */
    #loadingState, #errorState, #endState {
      position: absolute; inset: 0; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; padding: 24px; text-align: center;
    }
    #loadingState {
      background: #050510; color: #a855f7;
      font-size: 0.82rem; letter-spacing: 0.14em;
      animation: pulse 1.8s ease-in-out infinite;
    }
    #errorState { background: #050510; display: none; color: rgba(196,181,245,0.6); font-size: 0.8rem; }
    #errorState strong { color: #a855f7; font-size: 0.9rem; display: block; }
    #endState {
      background: rgba(5,5,16,0.92); display: none;
      color: rgba(196,181,245,0.7); font-size: 0.78rem; letter-spacing: 0.1em;
    }
    #endState span { color: rgba(196,181,245,0.5); font-size: 0.7rem; }

    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

    /* ── TV STAND ── */
    .tv-stand { width: 30%; display: flex; flex-direction: column; align-items: center; }
    .stand-neck {
      width: 18px; height: 22px;
      background: linear-gradient(180deg, #2a2a40, #0d0d1a);
      border-left: 1.5px solid rgba(200,200,220,0.18);
      border-right: 1.5px solid rgba(200,200,220,0.18);
    }
    .stand-base {
      width: 100%; height: 8px;
      background: linear-gradient(180deg, #2a2a40, #0d0d1a);
      border-radius: 0 0 6px 6px;
      border: 1.5px solid rgba(200,200,220,0.14); border-top: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    @media (max-width: 600px) {
      .tv-frame { width: 100vw; }
      .tv-bezel { border-radius: 0; padding: 8px 8px 0; }
      .tv-controls { border-radius: 0; }
      .tv-stand { display: none; }
    }
  </style>
</head>
<body>

<div class="tv-frame">
  <div class="tv-bezel">
    <div class="tv-screen" id="tv-screen">
      <div class="screen-glow"></div>
      <div id="loadingState">Loading showcase…</div>
      <div id="errorState"><strong>Showcase not found</strong><p>This link may be invalid.</p></div>
      <div id="endState">
        <span>&#x25A0; &#x25A0; &#x25A0;</span>
        Showcase complete
        <span>Use the exit button below to close</span>
      </div>
      <div id="card-stage"></div>
      <div id="card-counter"></div>
      <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    </div>
  </div>

  <div class="tv-controls">
    <div class="bezel-dots">
      <div class="bezel-dot silver"></div>
      <div class="bezel-dot dim"></div>
      <div class="bezel-dot dim"></div>
    </div>
    <div class="bezel-title" id="bezel-title">3C Card Showcase</div>
    <div class="bezel-btns">
      <!-- ♪ = mute toggle. Active = playing, Muted = silenced -->
      <button class="bezel-btn" id="btn-music" title="Toggle ambient music"
        onclick="toggleMusic()">&#9836;</button>
      <button class="bezel-btn" id="btn-exit" title="Exit showcase"
        onclick="exitShowcase()">&#10005;</button>
    </div>
  </div>

  <div class="tv-stand">
    <div class="stand-neck"></div>
    <div class="stand-base"></div>
  </div>
</div>

<audio id="ambient-audio" loop preload="auto"></audio>

<script>
/* ═══════════════════════════════════════════════════
   public/index.html — 3C Card Showcase TV Viewer
   Built by Claude (Anthropic) × Chef Anica
   3C Thread To Success Cooking Lab
═══════════════════════════════════════════════════ */

  const WORKER_URL      = 'https://3c-card-showcase.3c-innertherapy.workers.dev';
  const DEFAULT_CARD_MS = 9000;  // default display time per card
  const ENTER_MS        = 800;
  const EXIT_MS         = 800;

  let cards        = [];
  let currentIdx   = 0;
  let isRunning    = false;
  let musicEnabled = false;  // false = muted, true = playing
  let hasMusic     = false;
  let exitTarget   = '../index.html';
  let cardTimer    = null;

  function getSlug() {
    return new URLSearchParams(location.search).get('showcase');
  }

  /* ── INIT ── */
  async function init() {
    const slug = getSlug();
    if (!slug) { showError(); return; }

    let data = null;
    try {
      const cached = sessionStorage.getItem('showcaseData');
      if (cached) { data = JSON.parse(cached); sessionStorage.removeItem('showcaseData'); }
    } catch(_) {}

    if (!data || !data.cards || data.cards.length === 0) {
      try {
        const res = await fetch(`${WORKER_URL}/showcase/${slug}`);
        if (!res.ok) throw new Error();
        data = await res.json();
      } catch(_) { showError(); return; }
    }

    if (!data || !data.cards || data.cards.length === 0) { showError(); return; }

    cards = data.cards;
    document.getElementById('bezel-title').textContent = data.title || '3C Card Showcase';
    exitTarget = `../landing.html?showcase=${encodeURIComponent(slug)}`;

    /* ── Ambient music: auto-play, button = mute toggle ── */
    if (data.ambient_music_url) {
      hasMusic = true;
      const audio = document.getElementById('ambient-audio');
      audio.src   = data.ambient_music_url;
      audio.load();

      // Auto-play — works because user arrived via a click (BEGIN button on consent page)
      audio.play()
        .then(() => {
          musicEnabled = true;
          document.getElementById('btn-music').classList.add('active');
        })
        .catch(() => {
          // Browser blocked autoplay — show button as muted, user can tap to start
          musicEnabled = false;
          document.getElementById('btn-music').classList.add('muted');
        });

      document.getElementById('btn-music').style.display = 'flex';
    } else {
      document.getElementById('btn-music').style.display = 'none';
    }

    hideLoading();
    runShowcase();
  }

  /* ── SHOWCASE RUNNER ── */
  function runShowcase() {
    isRunning = true;
    showCard(0);
  }

  function showCard(idx) {
    if (idx >= cards.length) { endShowcase(); return; }
    currentIdx = idx;

    const card       = cards[idx];
    const fromLeft   = idx % 2 === 0;
    const totalCards = cards.length;

    // Per-card duration — falls back to DEFAULT_CARD_MS if not set
    const cardMs  = (card.duration_ms && card.duration_ms > 0) ? card.duration_ms : DEFAULT_CARD_MS;
    const floatMs = cardMs - ENTER_MS - EXIT_MS;

    document.getElementById('card-counter').textContent = `${idx + 1} \u2022 ${totalCards}`;
    document.getElementById('progress-bar').style.width = `${((idx + 1) / totalCards) * 100}%`;

    const stage = document.getElementById('card-stage');
    stage.innerHTML = '';

    const el  = document.createElement('div');
    el.className = `showcase-card shape-${card.shape || 'rectangle'}`;

    const img = document.createElement('img');
    img.src       = card.image_url || '';
    img.alt       = `Card ${idx + 1}`;
    img.draggable = false;
    el.appendChild(img);

    // Download button
    const dlBtn = document.createElement('button');
    dlBtn.className = 'btn-download';
    dlBtn.title     = 'Download this card';
    dlBtn.innerHTML = '&#8595;';
    dlBtn.addEventListener('click', e => { e.stopPropagation(); downloadCard(card.image_url, idx + 1); });
    el.appendChild(dlBtn);

    stage.appendChild(el);

    // Phase 1: Enter
    el.style.animation = `${fromLeft ? 'enterFromLeft' : 'enterFromRight'} ${ENTER_MS}ms ease forwards`;

    // Phase 2: Float
    setTimeout(() => {
      el.style.animation = `${fromLeft ? 'floatLeft' : 'floatRight'} ${floatMs}ms ease-in-out infinite`;
      el.style.opacity   = '1';
      el.style.transform = `rotate(${fromLeft ? '-2deg' : '2deg'})`;
    }, ENTER_MS);

    // Phase 3: Exit → next card
    cardTimer = setTimeout(() => {
      el.style.animation = `${fromLeft ? 'exitToRight' : 'exitToLeft'} ${EXIT_MS}ms ease forwards`;
      setTimeout(() => showCard(idx + 1), EXIT_MS);
    }, ENTER_MS + floatMs);
  }

  /* ── END ── */
  function endShowcase() {
    isRunning = false;
    document.getElementById('card-stage').innerHTML   = '';
    document.getElementById('endState').style.display = 'flex';
    document.getElementById('progress-bar').style.width = '100%';
    document.getElementById('card-counter').textContent = '';
    document.getElementById('btn-exit').classList.add('exit-highlight');
  }

  /* ── EXIT ── */
  function exitShowcase() {
    if (cardTimer) clearTimeout(cardTimer);
    stopMusic();
    location.href = exitTarget;
  }
  window.exitShowcase = exitShowcase;

  /* ── MUSIC TOGGLE — playing → mute, muted → play ── */
  function toggleMusic() {
    if (!hasMusic) return;
    const audio = document.getElementById('ambient-audio');
    const btn   = document.getElementById('btn-music');

    if (musicEnabled) {
      audio.pause();
      musicEnabled = false;
      btn.classList.remove('active');
      btn.classList.add('muted');
    } else {
      audio.play().catch(() => {});
      musicEnabled = true;
      btn.classList.remove('muted');
      btn.classList.add('active');
    }
  }
  window.toggleMusic = toggleMusic;

  function stopMusic() {
    document.getElementById('ambient-audio').pause();
    musicEnabled = false;
  }

  /* ── DOWNLOAD ── */
  async function downloadCard(url, idx) {
    try {
      const res  = await fetch(url);
      const blob = await res.blob();
      const link = document.createElement('a');
      link.href     = URL.createObjectURL(blob);
      link.download = `3c-card-${String(idx).padStart(3, '0')}.png`;
      link.click();
      URL.revokeObjectURL(link.href);
    } catch(e) { console.warn('Download failed:', e); }
  }

  function hideLoading() { document.getElementById('loadingState').style.display = 'none'; }
  function showError() {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display   = 'flex';
  }

  init();
</script>
</body>
</html>
