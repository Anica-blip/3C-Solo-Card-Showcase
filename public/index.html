<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>3C Card Showcase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../favicon.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #06040f;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Open Sans', sans-serif;
      overflow: hidden;
    }

    /* ── TV OUTER FRAME ──────────────────────────── */
    .tv-frame {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(720px, 95vw);
    }

    /* ── TV BEZEL ────────────────────────────────── */
    .tv-bezel {
      width: 100%;
      background: linear-gradient(160deg, #1a1a28 0%, #0d0d1a 100%);
      border-radius: 18px 18px 0 0;
      padding: 14px 14px 0;
      border: 1.5px solid rgba(160,160,200,0.12);
      border-bottom: none;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 -4px 30px rgba(0,0,80,0.3);
    }

    /* ── TV SCREEN ───────────────────────────────── */
    .tv-screen {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #050510;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      box-shadow:
        inset 0 0 80px rgba(0,0,60,0.5),
        inset 0 0 2px rgba(120,80,255,0.15);
    }

    /* Subtle scanline texture */
    .tv-screen::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 3px,
        rgba(0,0,0,0.04) 3px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none; z-index: 10;
    }

    /* Screen ambient glow */
    .screen-glow {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%,
        rgba(80,40,160,0.08) 0%,
        transparent 70%);
      pointer-events: none; z-index: 1;
    }

    /* ── CARD STAGE ──────────────────────────────── */
    #card-stage {
      position: absolute; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── CARD ────────────────────────────────────── */
    .showcase-card {
      position: absolute;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      will-change: transform, opacity;
    }

    .showcase-card img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      display: block;
      box-shadow: 0 10px 50px rgba(0,0,0,0.7);
    }

    /* Shape variants */
    .showcase-card.shape-rectangle {
      width: 42%;
      height: 85%;
    }
    .showcase-card.shape-rectangle img {
      border-radius: 10px;
    }

    .showcase-card.shape-square {
      width: 60%;
      height: 85%;
    }
    .showcase-card.shape-square img {
      border-radius: 10px;
    }

    .showcase-card.shape-circle {
      width: 50%;
      height: 85%;
    }
    .showcase-card.shape-circle img {
      border-radius: 50%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }

    /* ── DOWNLOAD BUTTON (per card) ──────────────── */
    .btn-download {
      position: absolute;
      bottom: 10px; right: 10px;
      width: 34px; height: 34px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(200,169,110,0.5);
      border-radius: 50%;
      color: rgba(226,201,138,0.85);
      font-size: 15px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s, opacity 0.15s;
      opacity: 0.6;
      z-index: 5;
    }
    .btn-download:hover {
      background: rgba(200,169,110,0.25);
      border-color: rgba(226,201,138,0.9);
      opacity: 1;
      color: #E2C98A;
    }

    /* ── PROGRESS BAR ────────────────────────────── */
    #progress-bar-wrap {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.05);
      z-index: 6;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #a855f7);
      width: 0%;
      transition: width 0.3s ease;
    }

    /* ── CARD COUNTER (on screen, top-left) ──────── */
    #card-counter {
      position: absolute;
      top: 10px; left: 12px;
      font-size: 11px; font-weight: 700;
      color: rgba(196,181,245,0.6);
      letter-spacing: 0.1em;
      z-index: 6;
    }

    /* ── ANIMATIONS ──────────────────────────────── */

    /* Enter from left */
    @keyframes enterFromLeft {
      0%   { opacity: 0; transform: translateX(-55%) rotate(-8deg); }
      100% { opacity: 1; transform: translateX(0)    rotate(-2deg); }
    }
    /* Enter from right */
    @keyframes enterFromRight {
      0%   { opacity: 0; transform: translateX(55%)  rotate(8deg); }
      100% { opacity: 1; transform: translateX(0)    rotate(2deg); }
    }
    /* Float while displayed — left tilt */
    @keyframes floatLeft {
      0%,100% { transform: rotate(-2deg) translateY(0px);  }
      50%      { transform: rotate(-4deg) translateY(-10px); }
    }
    /* Float while displayed — right tilt */
    @keyframes floatRight {
      0%,100% { transform: rotate(2deg) translateY(0px);  }
      50%      { transform: rotate(4deg) translateY(-10px); }
    }
    /* Exit to right */
    @keyframes exitToRight {
      0%   { opacity: 1; transform: translateX(0)   rotate(-2deg); }
      100% { opacity: 0; transform: translateX(55%) rotate(-8deg); }
    }
    /* Exit to left */
    @keyframes exitToLeft {
      0%   { opacity: 1; transform: translateX(0)    rotate(2deg); }
      100% { opacity: 0; transform: translateX(-55%) rotate(8deg); }
    }
    /* End glow pulse on exit button */
    @keyframes endPulse {
      0%,100% { box-shadow: 0 0 10px rgba(226,201,138,0.4), 0 0 20px rgba(200,169,110,0.2); }
      50%      { box-shadow: 0 0 20px rgba(226,201,138,0.9), 0 0 40px rgba(200,169,110,0.6); }
    }

    /* ── BEZEL CONTROLS ──────────────────────────── */
    .tv-controls {
      width: 100%;
      background: linear-gradient(160deg, #14141f 0%, #0a0a14 100%);
      border-radius: 0 0 18px 18px;
      border: 1.5px solid rgba(160,160,200,0.12);
      border-top: none;
      padding: 10px 18px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Brand dot strip — decorative */
    .bezel-dots {
      display: flex; gap: 5px; align-items: center;
    }
    .bezel-dot {
      width: 6px; height: 6px; border-radius: 50%;
    }
    .bezel-dot.purple { background: rgba(124,58,237,0.7); }
    .bezel-dot.dim    { background: rgba(80,80,100,0.4); }

    /* Bezel title */
    .bezel-title {
      font-size: 11px; font-weight: 700;
      color: rgba(196,181,245,0.45);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      flex: 1; text-align: center;
    }

    /* Bezel buttons */
    .bezel-btns {
      display: flex; gap: 8px; align-items: center;
    }

    .bezel-btn {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(160,160,200,0.18);
      border-radius: 50%;
      color: rgba(200,200,220,0.7);
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .bezel-btn:hover {
      background: rgba(124,58,237,0.2);
      border-color: rgba(168,85,247,0.5);
      color: #c4b5f5;
    }
    .bezel-btn.active {
      background: rgba(124,58,237,0.3);
      border-color: rgba(168,85,247,0.7);
      color: #e2d9f3;
    }
    .bezel-btn.exit-highlight {
      animation: endPulse 1.2s ease-in-out infinite;
      border-color: rgba(226,201,138,0.7);
      color: #E2C98A;
    }

    /* ── TV STAND ────────────────────────────────── */
    .tv-stand {
      width: 30%;
      display: flex; flex-direction: column; align-items: center;
    }
    .stand-neck {
      width: 18px; height: 22px;
      background: linear-gradient(180deg, #1a1a28, #0d0d1a);
      border-left: 1.5px solid rgba(160,160,200,0.1);
      border-right: 1.5px solid rgba(160,160,200,0.1);
    }
    .stand-base {
      width: 100%; height: 8px;
      background: linear-gradient(180deg, #1a1a28, #0d0d1a);
      border-radius: 0 0 6px 6px;
      border: 1.5px solid rgba(160,160,200,0.1);
      border-top: none;
    }

    /* ── LOADING / ERROR ─────────────────────────── */
    #loadingState, #errorState, #endState {
      position: absolute; inset: 0; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; padding: 24px; text-align: center;
    }
    #loadingState {
      background: #050510;
      color: #a855f7; font-size: 0.82rem;
      letter-spacing: 0.14em;
      animation: pulse 1.8s ease-in-out infinite;
    }
    #errorState {
      background: #050510; display: none;
      color: rgba(196,181,245,0.6); font-size: 0.8rem;
    }
    #errorState strong { color: #a855f7; font-size: 0.9rem; display: block; }
    #endState {
      background: rgba(5,5,16,0.92); display: none;
      color: rgba(196,181,245,0.7); font-size: 0.78rem;
      letter-spacing: 0.1em;
    }
    #endState span { color: rgba(196,181,245,0.5); font-size: 0.7rem; }

    @keyframes pulse {
      0%,100% { opacity: 0.4; }
      50%      { opacity: 1; }
    }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      .tv-frame { width: 100vw; }
      .tv-bezel { border-radius: 0; padding: 8px 8px 0; }
      .tv-controls { border-radius: 0; padding: 8px 12px 10px; }
      .tv-stand { display: none; }
    }
  </style>
</head>
<body>

<!-- ── TV FRAME ──────────────────────────────────── -->
<div class="tv-frame">

  <!-- Bezel top + screen -->
  <div class="tv-bezel">
    <div class="tv-screen" id="tv-screen">

      <div class="screen-glow"></div>

      <!-- Loading -->
      <div id="loadingState">Loading showcase…</div>

      <!-- Error -->
      <div id="errorState">
        <strong>Showcase not found</strong>
        <p>This link may be invalid or the showcase has been removed.</p>
      </div>

      <!-- End screen -->
      <div id="endState">
        <span>&#x25A0; &#x25A0; &#x25A0;</span>
        Showcase complete
        <span>Use the exit button below to close</span>
      </div>

      <!-- Card stage -->
      <div id="card-stage"></div>

      <!-- Card counter -->
      <div id="card-counter"></div>

      <!-- Progress bar -->
      <div id="progress-bar-wrap">
        <div id="progress-bar"></div>
      </div>

    </div>
  </div><!-- /bezel -->

  <!-- Controls bezel -->
  <div class="tv-controls">
    <div class="bezel-dots">
      <div class="bezel-dot purple"></div>
      <div class="bezel-dot dim"></div>
      <div class="bezel-dot dim"></div>
    </div>
    <div class="bezel-title" id="bezel-title">3C Card Showcase</div>
    <div class="bezel-btns">
      <!-- Music toggle -->
      <button class="bezel-btn" id="btn-music" title="Toggle ambient music"
        onclick="toggleMusic()">&#9836;</button>
      <!-- Exit -->
      <button class="bezel-btn" id="btn-exit" title="Exit showcase"
        onclick="exitShowcase()">&#10005;</button>
    </div>
  </div>

  <!-- Stand -->
  <div class="tv-stand">
    <div class="stand-neck"></div>
    <div class="stand-base"></div>
  </div>

</div><!-- /tv-frame -->

<!-- Ambient audio -->
<audio id="ambient-audio" loop preload="none"></audio>

<script>
/* ═══════════════════════════════════════════════════
   public/index.html — 3C Card Showcase TV Viewer
   ────────────────────────────────────────────────────
   Built by Claude (Anthropic) × Chef Anica
   3C Thread To Success Cooking Lab
═══════════════════════════════════════════════════ */

  const WORKER_URL = 'https://3c-card-showcase.3c-innertherapy.workers.dev';
  const CARD_DISPLAY_MS = 5000; // ms per card (enter+float+exit)
  const ENTER_MS        = 800;
  const EXIT_MS         = 800;
  const FLOAT_MS        = CARD_DISPLAY_MS - ENTER_MS - EXIT_MS;

  let cards        = [];
  let currentIdx   = 0;
  let isRunning    = false;
  let musicEnabled = false;
  let exitTarget   = '../index.html'; // default, overridden by referrer
  let cardTimer    = null;

  /* ── GET SLUG ──────────────────────────────────── */
  function getSlug() {
    return new URLSearchParams(location.search).get('showcase');
  }

  /* ── INIT ──────────────────────────────────────── */
  async function init() {
    const slug = getSlug();
    if (!slug) { showError(); return; }

    // Try session storage first (set by landing.html)
    let data = null;
    try {
      const cached = sessionStorage.getItem('showcaseData');
      if (cached) { data = JSON.parse(cached); sessionStorage.removeItem('showcaseData'); }
    } catch(_) {}

    // Fallback: fetch from worker
    if (!data || !data.cards || data.cards.length === 0) {
      try {
        const res = await fetch(`${WORKER_URL}/showcase/${slug}`);
        if (!res.ok) throw new Error();
        data = await res.json();
      } catch(_) { showError(); return; }
    }

    if (!data || !data.cards || data.cards.length === 0) { showError(); return; }

    cards = data.cards;

    // Bezel title
    document.getElementById('bezel-title').textContent = data.title || '3C Card Showcase';

    // Exit target: go back to landing page
    exitTarget = `../landing.html?showcase=${encodeURIComponent(slug)}`;

    // Ambient music
    if (data.ambient_music_url) {
      const audio = document.getElementById('ambient-audio');
      audio.src = data.ambient_music_url;
      document.getElementById('btn-music').style.display = 'flex';
    } else {
      document.getElementById('btn-music').style.display = 'none';
    }

    hideLoading();
    runShowcase();
  }

  /* ── SHOWCASE RUNNER ───────────────────────────── */
  function runShowcase() {
    isRunning = true;
    showCard(0);
  }

  function showCard(idx) {
    if (idx >= cards.length) { endShowcase(); return; }
    currentIdx = idx;

    const card       = cards[idx];
    const fromLeft   = idx % 2 === 0; // alternate sides
    const totalCards = cards.length;

    // Counter
    document.getElementById('card-counter').textContent =
      `${idx + 1} \u2022 ${totalCards}`;

    // Progress
    document.getElementById('progress-bar').style.width =
      `${((idx + 1) / totalCards) * 100}%`;

    // Create card element
    const stage = document.getElementById('card-stage');
    stage.innerHTML = '';

    const el = document.createElement('div');
    el.className = `showcase-card shape-${card.shape || 'rectangle'}`;

    const img = document.createElement('img');
    img.src = card.image_url || '';
    img.alt = `Card ${idx + 1}`;
    img.draggable = false;
    el.appendChild(img);

    // Download button
    const dlBtn = document.createElement('button');
    dlBtn.className = 'btn-download';
    dlBtn.title = 'Download this card';
    dlBtn.innerHTML = '&#8595;';
    dlBtn.addEventListener('click', e => {
      e.stopPropagation();
      downloadCard(card.image_url, idx + 1);
    });
    el.appendChild(dlBtn);

    stage.appendChild(el);

    // Phase 1: Enter
    el.style.animation = `${fromLeft ? 'enterFromLeft' : 'enterFromRight'} ${ENTER_MS}ms ease forwards`;

    // Phase 2: Float (after enter)
    setTimeout(() => {
      el.style.animation = `${fromLeft ? 'floatLeft' : 'floatRight'} ${FLOAT_MS}ms ease-in-out infinite`;
      el.style.opacity   = '1';
      el.style.transform = `rotate(${fromLeft ? '-2deg' : '2deg'})`;
    }, ENTER_MS);

    // Phase 3: Exit (before next card)
    cardTimer = setTimeout(() => {
      el.style.animation = `${fromLeft ? 'exitToRight' : 'exitToLeft'} ${EXIT_MS}ms ease forwards`;
      setTimeout(() => showCard(idx + 1), EXIT_MS);
    }, ENTER_MS + FLOAT_MS);
  }

  /* ── END SHOWCASE ──────────────────────────────── */
  function endShowcase() {
    isRunning = false;
    document.getElementById('card-stage').innerHTML = '';
    document.getElementById('endState').style.display = 'flex';
    document.getElementById('progress-bar').style.width = '100%';
    document.getElementById('card-counter').textContent = '';

    // Highlight exit button
    document.getElementById('btn-exit').classList.add('exit-highlight');
  }

  /* ── EXIT ──────────────────────────────────────── */
  function exitShowcase() {
    if (cardTimer) clearTimeout(cardTimer);
    stopMusic();
    location.href = exitTarget;
  }
  window.exitShowcase = exitShowcase;

  /* ── MUSIC ─────────────────────────────────────── */
  function toggleMusic() {
    const audio = document.getElementById('ambient-audio');
    const btn   = document.getElementById('btn-music');
    if (musicEnabled) {
      audio.pause();
      musicEnabled = false;
      btn.classList.remove('active');
    } else {
      audio.play().catch(() => {});
      musicEnabled = true;
      btn.classList.add('active');
    }
  }
  window.toggleMusic = toggleMusic;

  function stopMusic() {
    const audio = document.getElementById('ambient-audio');
    audio.pause();
    musicEnabled = false;
  }

  /* ── DOWNLOAD CARD ─────────────────────────────── */
  async function downloadCard(url, idx) {
    try {
      const res  = await fetch(url);
      const blob = await res.blob();
      const link = document.createElement('a');
      link.href     = URL.createObjectURL(blob);
      link.download = `3c-card-${String(idx).padStart(3, '0')}.png`;
      link.click();
      URL.revokeObjectURL(link.href);
    } catch(e) {
      console.warn('Download failed:', e);
    }
  }

  /* ── HELPERS ───────────────────────────────────── */
  function hideLoading() {
    document.getElementById('loadingState').style.display = 'none';
  }

  function showError() {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display   = 'flex';
  }

  /* ── START ─────────────────────────────────────── */
  init();
</script>

</body>
</html>
