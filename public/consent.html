<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3C Card Showcase</title>
  <!-- ══════════════════════════════════════════════════
       public/consent.html — 3C Card Showcase
       ──────────────────────────────────────────────────
       The consent screen now lives inside index.html so
       the user gesture (Begin click) and audio/video
       playback happen on the SAME page — no gesture loss.

       This file is kept as a pass-through so any
       existing links (landing.html → consent.html?showcase=)
       continue to work without changes.

       Built with ❤️ by Claude (Anthropic) × Chef Anica
       3C Thread To Success Cooking Lab 🧪👨‍🍳
  ══════════════════════════════════════════════════ -->
  <style>
    body { background: #06040f; margin: 0; }
  </style>
</head>
<body>
<script>
  // Pass the full query string straight through to index.html.
  // ?showcase=slug is preserved. Nothing is lost.
  (function() {
    const slug = new URLSearchParams(location.search).get('showcase');
    if (slug) {
      location.replace('index.html?showcase=' + encodeURIComponent(slug));
    } else {
      location.replace('../landing.html');
    }
  })();
</script>
</body>
</html>
