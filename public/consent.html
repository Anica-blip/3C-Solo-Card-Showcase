<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>3C Card Showcase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../favicon.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; min-height: 100%;
      background: #06040f;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Open Sans', sans-serif;
      overflow-y: auto;
    }

    .tv-frame {
      position: relative;
      display: flex; flex-direction: column; align-items: center;
      width: min(720px, 95vw);
    }

    /* ── SILVER BEZEL ── */
    .tv-bezel {
      width: 100%;
      background: linear-gradient(160deg, #22223a 0%, #0d0d1a 60%, #18182c 100%);
      border-radius: 18px 18px 0 0;
      padding: 14px 14px 0;
      border-bottom: none; position: relative;
      box-shadow:
        0 0 0 2px rgba(210,210,230,0.2),
        inset 0 1px 0 rgba(255,255,255,0.10),
        0 -4px 30px rgba(0,0,80,0.3);
    }
    .tv-bezel::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      border-radius: 18px 18px 0 0;
      background: linear-gradient(90deg,
        rgba(120,120,140,0.3) 0%, rgba(220,220,240,0.7) 30%,
        rgba(255,255,255,0.9) 50%, rgba(220,220,240,0.7) 70%,
        rgba(120,120,140,0.3) 100%);
    }

    /* ── TV SCREEN ── */
    .tv-screen {
      width: 100%; aspect-ratio: 16 / 9;
      background: #050510; border-radius: 8px;
      position: relative; overflow: hidden;
      box-shadow:
        inset 0 0 80px rgba(0,0,60,0.6),
        inset 0 0 3px rgba(120,80,255,0.2),
        0 2px 0 rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
    }
    .tv-screen::after {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 3px,
        rgba(0,0,0,0.035) 3px, rgba(0,0,0,0.035) 4px
      );
      pointer-events: none; z-index: 10;
    }
    .screen-glow {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(80,40,160,0.07) 0%, transparent 70%);
      pointer-events: none; z-index: 1;
    }

    /* ── CONSENT CONTENT ── */
    .consent-body {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: clamp(14px, 3vw, 30px);
      padding: clamp(24px, 6vw, 56px);
      text-align: center; width: 100%;
    }

    /* Main instruction — neon white, large */
    .consent-sub {
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      font-weight: 600;
      color: #ffffff;
      line-height: 1.9;
      text-shadow:
        0 0 12px rgba(196,181,245,0.9),
        0 0 30px rgba(168,85,247,0.5),
        0 0 60px rgba(124,58,237,0.25);
      letter-spacing: 0.02em;
    }

    /* Card count */
    .consent-meta {
      font-size: clamp(0.7rem, 1.4vw, 0.85rem);
      font-weight: 700;
      color: rgba(168,85,247,0.75);
      letter-spacing: 0.12em; text-transform: uppercase;
      text-shadow: 0 0 10px rgba(168,85,247,0.5);
    }

    /* ── BEGIN BUTTON ── */
    .btn-begin {
      font-family: 'Open Sans', sans-serif;
      font-size: clamp(0.8rem, 1.8vw, 1rem);
      font-weight: 800; letter-spacing: 0.22em; text-transform: uppercase;
      color: #3B1265;
      background: linear-gradient(135deg, #E2C98A, #C8A96E);
      border: none; border-radius: 50px;
      padding: clamp(12px, 2.2vw, 17px) clamp(36px, 7vw, 62px);
      cursor: pointer;
      box-shadow:
        0 0 20px rgba(226,201,138,0.6),
        0 0 40px rgba(200,169,110,0.35),
        0 4px 22px rgba(200,169,110,0.45);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .btn-begin:hover {
      transform: translateY(-2px);
      box-shadow:
        0 0 30px rgba(226,201,138,0.9),
        0 0 60px rgba(200,169,110,0.6),
        0 8px 30px rgba(200,169,110,0.65);
    }
    .btn-begin:active { transform: scale(0.96); }

    /* Back */
    .btn-back {
      background: none;
      border: 1px solid rgba(168,85,247,0.25); border-radius: 20px;
      padding: clamp(4px, 0.8vw, 7px) clamp(14px, 2.8vw, 20px);
      font-size: clamp(0.58rem, 1.1vw, 0.7rem);
      font-weight: 700; letter-spacing: 0.1em;
      color: rgba(168,85,247,0.5); cursor: pointer;
      transition: all 0.15s; text-transform: uppercase;
    }
    .btn-back:hover { border-color: rgba(168,85,247,0.5); color: rgba(168,85,247,0.85); }

    /* ── SILVER CONTROLS BEZEL ── */
    .tv-controls {
      width: 100%;
      background: linear-gradient(160deg, #18182c 0%, #0a0a14 100%);
      border-radius: 0 0 18px 18px; border-top: none;
      padding: 10px 18px 12px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      box-shadow:
        0 0 0 2px rgba(210,210,230,0.17),
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 4px 20px rgba(0,0,0,0.5);
    }
    .tv-controls::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      border-radius: 0 0 18px 18px;
      background: linear-gradient(90deg,
        rgba(120,120,140,0.3) 0%, rgba(200,200,220,0.6) 30%,
        rgba(240,240,255,0.85) 50%, rgba(200,200,220,0.6) 70%,
        rgba(120,120,140,0.3) 100%);
    }
    .bezel-title {
      font-size: clamp(0.55rem, 1.1vw, 0.68rem); font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(196,181,245,0.35);
    }

    /* ── TV STAND ── */
    .tv-stand { width: 30%; display: flex; flex-direction: column; align-items: center; }
    .stand-neck {
      width: 18px; height: 22px;
      background: linear-gradient(180deg, #2a2a40, #0d0d1a);
      border-left: 1.5px solid rgba(200,200,220,0.18);
      border-right: 1.5px solid rgba(200,200,220,0.18);
    }
    .stand-base {
      width: 100%; height: 8px;
      background: linear-gradient(180deg, #2a2a40, #0d0d1a);
      border-radius: 0 0 6px 6px;
      border: 1.5px solid rgba(200,200,220,0.14); border-top: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    /* ── WATERMARK — prominent ── */
    .consent-footer {
      margin-top: 10px; text-align: center;
      font-size: clamp(0.62rem, 1.2vw, 0.78rem);
      font-weight: 600;
      color: rgba(196,181,245,0.55);
      letter-spacing: 0.06em; line-height: 1.7;
    }
    .consent-footer strong { color: rgba(168,85,247,0.8); }

    @media (max-width: 600px) {
      html, body { align-items: center; justify-content: center; padding: 20px 0; min-height: 100dvh; }
      .tv-frame { width: 100vw; padding-bottom: 16px; }
      .tv-bezel { border-radius: 0; padding: 8px 8px 0; }
      .tv-controls { border-radius: 0; }
      .tv-stand { display: none; }
      .consent-footer { padding: 0 16px; }

      /* Remove 16:9 lock on portrait mobile — screen grows to fit content */
      .tv-screen {
        aspect-ratio: unset;
        min-height: 260px;
        height: auto;
      }
      .consent-body {
        padding: 28px 20px;
        gap: 18px;
      }
      .consent-sub {
        font-size: 1rem;
        line-height: 1.75;
      }
      .btn-begin {
        padding: 14px 44px;
        font-size: 0.88rem;
      }
    }
  </style>
</head>
<body>

<div class="tv-frame">
  <div class="tv-bezel">
    <div class="tv-screen">
      <div class="screen-glow"></div>

      <div class="consent-body">

        <div class="consent-sub">
          Cards float one by one across your screen.<br/>
          Download any card you love — exit anytime.
        </div>

        <div class="consent-meta" id="consent-meta"></div>

        <button class="btn-begin" onclick="beginShowcase()">Begin</button>

        <button class="btn-back" onclick="goBack()">&#8592; Back</button>
      </div>
    </div>
  </div>

  <div class="tv-controls">
    <div class="bezel-title" id="bezel-label">3C Card Showcase</div>
  </div>

  <div class="tv-stand">
    <div class="stand-neck"></div>
    <div class="stand-base"></div>
  </div>

  <!-- Watermark — visible, prominent -->
  <div class="consent-footer">
    Built with &#9829; by <strong>Claude (Anthropic)</strong> &times; Chef Anica &middot; Anica-Blip
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   public/consent.html — 3C Card Showcase
   Built by Claude (Anthropic) × Chef Anica · Anica-Blip
═══════════════════════════════════════════════════ */
  const VIEWER_PAGE  = 'index.html';
  const LANDING_PAGE = '../landing.html';

  function getSlug() {
    return new URLSearchParams(location.search).get('showcase');
  }

  function init() {
    let data = null;
    try {
      const cached = sessionStorage.getItem('showcaseData');
      if (cached) data = JSON.parse(cached);
    } catch(_) {}

    const title  = data?.title || 'Card Showcase';
    const cards  = data?.cards || [];

    document.getElementById('bezel-label').textContent = title;

    if (cards.length > 0) {
      document.getElementById('consent-meta').textContent =
        `${cards.length} card${cards.length !== 1 ? 's' : ''} in this showcase`;
    }
  }

  window.beginShowcase = function() {
    const slug = getSlug();
    if (!slug) { location.href = LANDING_PAGE; return; }
    // sessionStorage data stays for viewer
    location.href = `${VIEWER_PAGE}?showcase=${encodeURIComponent(slug)}`;
  };

  window.goBack = function() {
    const slug = getSlug();
    location.href = slug
      ? `${LANDING_PAGE}?showcase=${encodeURIComponent(slug)}`
      : LANDING_PAGE;
  };

  init();
</script>
</body>
</html>
